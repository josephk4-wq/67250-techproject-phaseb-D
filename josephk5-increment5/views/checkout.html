<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding and responsive viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title displayed in browser tab -->
    <title>MonoMuse | Checkout</title>

    <!-- Main stylesheet for layout and visual design -->
    <link rel="stylesheet" href="../static/style.css">

    <!-- jQuery library for handling interactivity -->
    <script src="https://code.jquery.com/jquery-4.0.0-beta.min.js"></script>

    <!-- Custom JavaScript file for slideshow, form logic, and interactions -->
    <script src="../static/script.js" defer></script>
</head>
<body>
    <!-- Main container wrapping the entire page -->
    <div class="container">

        <!-- Header displaying site name -->
        <header class="header">
            <h1>MonoMuse</h1>
        </header>

        <!-- Navigation bar linking to all pages -->
        <nav id="navbar" class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Tickets</a>
            <a href="checkout.html">Checkout</a>

            <!-- Mobile menu toggle icon -->
            <a href="javascript:void(0);" class="icon" onclick="toggleMenu()">☰</a>
        </nav>

        <!-- Main content section -->
        <main class="main">

            <!-- Logo section -->
            <div class="page-logo-wrap">
                <img id="logo" src="../static/pokemon-logo.png" alt="MonoMuse Logo">
            </div>

            <!-- Slideshow highlighting checkout process visuals -->
            <div id="checkoutSlideshow" class="slideshow">

                <!-- Individual slides -->
                <div class="slide">
                    <img src="../static/checkout-pokeball.jpg" alt="Checkout slide 1">
                    <div class="caption">Quick Checkout</div>
                </div>

                <div class="slide">
                    <img src="../static/monomuse-museum.jpg" alt="Checkout slide 2">
                    <div class="caption">Finalize Your Visit</div>
                </div>

                <div class="slide">
                    <img src="../static/hero-snorlax.jpg" alt="Checkout slide 3">
                    <div class="caption">Complete Reservation Details</div>
                </div>

                <!-- Slideshow navigation controls -->
                <button class="prev" onclick="plusSlides('checkoutSlideshow', -1)">❮</button>
                <button class="next" onclick="plusSlides('checkoutSlideshow', 1)">❯</button>
            </div>

            <!-- Checkout form for user input -->
            <form>
                <h2>Quick Checkout Form</h2>

                <!-- Name input field -->
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <!-- Email input field -->
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <!-- Ticket quantity input triggers total calculation via JS -->
                <label for="quantity">Ticket Quantity</label>
                <input type="number" id="quantity" name="quantity" min="1" required oninput="calculateTotal()">

                <!-- Display of dynamically calculated total price -->
                <p><strong>Total Price: $<span id="totalPrice">0</span></strong></p>

                <!-- Dropdown for selecting preferred experience -->
                <label for="experience">Preferred Experience</label>
                <select id="experience" name="experience">
                    <option>Main Gallery</option>
                    <option>Interactive Exhibit Hall</option>
                    <option>Special Rotating Exhibition</option>
                </select>

                <br><br>

                <!-- Submit button triggers checkout logic in JS -->
                <button type="button" onclick="submitCheckout()">Submit</button>

                <!-- Confirmation message displayed after submission -->
                <p id="confirmationMessage" style="margin-top:15px; font-weight:bold;"></p>
            </form>
        </main>

        <!-- Footer with dynamically generated copyright -->
        <footer class="footer">
            <p id="copyYear"></p>
        </footer>

    </div>
</body>
</html>
